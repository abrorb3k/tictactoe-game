<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Tic Tac Toe AI</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>TIC TAC TOE</h1>

    <div class="scoreboard">
        <div>X: <span id="scoreX">0</span></div>
        <div>O: <span id="scoreO">0</span></div>
    </div>

    <div class="board" id="board">
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="cell"></div>
        <div class="win-line" id="winLine"></div>
    </div>

    <h2 id="status"></h2>
    <button onclick="restartGame()">Qayta boshlash</button>
    

    <script src="script.js"></script>
</body>
</html>
